<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 260px;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #FFF5E6, #FFE8CC);
      color: #4A3728;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 16px;
    }

    .cat-face {
      font-size: 48px;
      line-height: 1;
      margin-bottom: 6px;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      color: #D2691E;
    }

    .subtitle {
      font-size: 11px;
      color: #A0887A;
      margin-top: 2px;
    }

    .stats {
      background: white;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
    }

    .stat-label {
      font-size: 13px;
      color: #8B7355;
    }

    .stat-value {
      font-size: 14px;
      font-weight: 700;
      color: #D2691E;
    }

    .mood {
      text-align: center;
      margin-bottom: 14px;
      font-size: 13px;
      color: #A0887A;
    }

    .mood-bar {
      height: 6px;
      background: #EEE;
      border-radius: 3px;
      margin-top: 6px;
      overflow: hidden;
    }

    .mood-fill {
      height: 100%;
      background: linear-gradient(90deg, #FF6B6B, #FFD93D, #6BCB77);
      border-radius: 3px;
      transition: width 0.3s;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    button:active {
      transform: scale(0.97);
    }

    .btn-summon {
      background: linear-gradient(135deg, #F4A460, #E8913A);
      color: white;
      box-shadow: 0 3px 10px rgba(232,145,58,0.3);
      margin-bottom: 8px;
    }

    .btn-summon:hover {
      box-shadow: 0 4px 14px rgba(232,145,58,0.45);
    }

    /* ── Settings ── */
    .settings {
      background: white;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .settings-title {
      font-size: 13px;
      font-weight: 700;
      color: #D2691E;
      margin-bottom: 8px;
    }

    .setting-row {
      margin-bottom: 8px;
    }

    .setting-row label {
      display: block;
      font-size: 11px;
      color: #8B7355;
      margin-bottom: 3px;
    }

    .setting-row input {
      width: 100%;
      padding: 6px 8px;
      border: 1.5px solid #E8D5C0;
      border-radius: 6px;
      font-size: 13px;
      color: #4A3728;
      background: #FFF9F2;
      outline: none;
      transition: border-color 0.2s;
    }

    .setting-row input:focus {
      border-color: #F4A460;
    }

    .btn-save {
      background: linear-gradient(135deg, #8BC6A0, #6BCB77);
      color: white;
      box-shadow: 0 3px 10px rgba(107,203,119,0.3);
      margin-bottom: 8px;
      font-size: 12px;
      padding: 7px;
    }

    .preset-row {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }

    .btn-preset {
      flex: 1;
      padding: 6px 4px;
      font-size: 10px;
      font-weight: 600;
      border-radius: 6px;
      background: #FFF0E0;
      color: #D2891B;
      border: 1.5px solid #F4D9B0;
    }

    .btn-preset:hover {
      background: #FFE4C4;
    }

    .footer {
      text-align: center;
      margin-top: 10px;
      font-size: 10px;
      color: #C4A882;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="cat-face" id="catFace">🐱</div>
    <h1>Browser Cat</h1>
    <div class="subtitle">Your virtual browser companion</div>
  </div>

  <div class="stats">
    <div class="stat-row">
      <span class="stat-label">Total Pets</span>
      <span class="stat-value" id="totalPets">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Mood</span>
      <span class="stat-value" id="moodText">Happy</span>
    </div>
  </div>

  <div class="mood">
    Happiness
    <div class="mood-bar">
      <div class="mood-fill" id="moodBar" style="width: 80%"></div>
    </div>
  </div>

  <div class="settings">
    <div class="settings-title">Timing Settings</div>
    <div class="preset-row">
      <button class="btn-preset" data-preset="test">Testing (3s)</button>
      <button class="btn-preset" data-preset="normal">Normal (1min)</button>
      <button class="btn-preset" data-preset="chill">Chill (5min)</button>
    </div>
    <div class="setting-row">
      <label>Needs attention after (seconds) — min</label>
      <input type="number" id="cfgMin" min="1" step="1">
    </div>
    <div class="setting-row">
      <label>Needs attention after (seconds) — max</label>
      <input type="number" id="cfgMax" min="1" step="1">
    </div>
    <div class="setting-row">
      <label>Patience before attacking (seconds)</label>
      <input type="number" id="cfgDemand" min="1" step="1">
    </div>
    <button class="btn-save" id="saveBtn">Save Settings</button>
  </div>

  <button class="btn-summon" id="summonBtn">🐾 Get Cat's Attention</button>

  <div class="footer">Settings apply to all new tabs instantly</div>

  <script src="popup.js"></script>
</body>
</html>
